# nginx config for serving the Craftling SPA + proxying the control-plane API.
#
# Shipped to /etc/nginx/templates/default.conf.template; the nginx image's
# entrypoint runs envsubst over it at container start, so ${API_UPSTREAM} is
# substituted from the environment (default set in the Dockerfile). nginx's own
# runtime variables ($uri, $host, …) are left untouched — envsubst only replaces
# names that exist in the environment.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy the API to the Go control plane (no URI part on proxy_pass, so the
    # original /api/... path is forwarded unchanged).
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint lives on the control plane too.
    location = /healthz {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA fallback: unknown paths render index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
